<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki Knowledge Graph (Interactive)</title>
  <style>
    :root {
      --bg: #0f111a;          /* Obsidian-like dark background */
      --panel: #11131a;
      --fg: #e6e6e6;
      --muted: #a2a9b4;
      --accent: #4cc9f0;
      --link: #76d7f6;
      --grid: rgba(255,255,255,0.04);
    }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto; }
    #container { display: grid; grid-template-columns: 1fr 320px; height: 100vh; width: 100%; }
    #viz { position: relative; }
    svg { width: 100%; height: 100%; display: block; }
    #sidebar { padding: 12px; background: #11131a; border-left: 1px solid #222; overflow: auto; }
    #search { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #333; background: #0b0f14; color: #d9d9d9; }
    #search::placeholder { color: #777; }
    .section { margin-bottom: 12px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; padding: 6px; margin: 4px; border-radius: 6px; background: #0b0f14; border: 1px solid #222; }
    .legend-swatch { width: 12px; height: 12px; display: inline-block; border-radius: 2px; border: 1px solid #999; }
    .node-label { font-size: 10px; fill: #ddd; pointer-events: none; }
    #details { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas; font-size: 12px; color: #ddd; }
  </style>
</head>
<body>
  <div id="container">
    <div id="viz">
      <svg id="graph" preserveAspectRatio="xMidYMid slice"></svg>
    </div>
    <aside id="sidebar">
      <div class="section">
        <input id="search" placeholder="Search components..." />
      </div>
      <div class="section" id="legend"></div>
      <div class="section" id="details">
        <h3>Details</h3>
        <div id="details-content">Click on a node to view its details, including top relations.</div>
      </div>
    </aside>
  </div>

  <!-- D3.js (only CDN, no build step) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // GRAPH data is generated from knowledge.db and embedded here as a static JSON object.
    // WARNING: For a production run with all 282 nodes and ~1000+ edges, replace the empty GRAPH
    // below with the actual data exported from knowledge.db (see extraction steps in the task).
    // The structure is: { nodes: [{id, name, type, entity_count}], links: [{source, target, type, weight}] }
    const GRAPH = {
      nodes: [
        // Minimal sample to illustrate layout. Replace with exported data for full graph.
        {"id": "comp_0",  "name": "commands",  "type": "",  "entity_count": 0},
        {"id": "comp_1",  "name": "commands",  "type": "",  "entity_count": 0},
        {"id": "comp_2",  "name": "graph",      "type": "",  "entity_count": 0},
        {"id": "comp_3",  "name": "knowledge",  "type": "",  "entity_count": 0},
        {"id": "comp_4",  "name": "render",     "type": "",  "entity_count": 0} 
      ],
      links: [
        {"source": "comp_0", "target": "comp_1", "weight": 1, "type": "rel"},
        {"source": "comp_1", "target": "comp_2", "weight": 1, "type": "rel"},
        {"source": "comp_2", "target": "comp_3", "weight": 1, "type": "rel"},
        {"source": "comp_3", "target": "comp_4", "weight": 1, "type": "rel"}
      ]
    };

    // If the real data has more nodes, replace GRAPH with the full dataset exported from knowledge.db
    // and remove the sample block above.

    const width = () => Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
    const height = () => Math.max(document.documentElement.clientHeight, window.innerHeight || 0);

    const svg = d3.select('#graph')
      .attr('width', width())
      .attr('height', height());
    const g = svg.append('g');

    // Zoom/pan
    const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', (e) => g.attr('transform', e.transform));
    svg.call(zoom);

    // Color scales
    const edgeTypes = Array.from(new Set(GRAPH.links.map(l => l.type || 'relation')));
    const color = d3.scaleOrdinal().domain(edgeTypes).range(d3.schemeTableau10);
    const nodeColor = d3.scaleOrdinal(d3.schemePastel1);

    // Simulation
    const sim = d3.forceSimulation(GRAPH.nodes)
      .force('link', d3.forceLink(GRAPH.links).id(d => d.id).distance(d => Math.max(40, 60 + d.weight * 20)).strength(0.25))
      .force('charge', d3.forceManyBody().strength(-80))
      .force('center', d3.forceCenter(width()/2, height()/2))
      .on('tick', ticked);

    // Links
    const link = g.append('g')
      .selectAll('line')
      .data(GRAPH.links)
      .enter().append('line')
      .attr('stroke', d => color(d.type || 'relation'))
      .attr('stroke-width', d => Math.max(1, Math.sqrt(d.weight)))
      .attr('stroke-opacity', 0.8);

    // Nodes
    const node = g.append('g')
      .selectAll('g')
      .data(GRAPH.nodes)
      .enter().append('g')
      .on('click', (ev, d) => showDetails(d));

    const circles = node.append('circle')
      .attr('r', d => nodeRadius(d))
      .attr('fill', d => nodeColor(d.type || 'default'))
      .attr('stroke', '#222')
      .attr('stroke-width', 1.5)
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    // Labels (visible for larger nodes, otherwise on hover)
    const labels = node.append('text')
      .text(d => d.name)
      .attr('class', 'node-label')
      .attr('dx', 12)
      .attr('dy', '.35em')
      .style('opacity', d => nodeRadius(d) > 12 ? 1 : 0);

    node.on('mouseover', function(event, d) {
      if (nodeRadius(d) <= 12) labels.filter(l => l.id === d.id).style('opacity', 1);
    }).on('mouseout', function(event, d) {
      labels.filter(l => l.id === d.id).style('opacity', nodeRadius(d) > 12 ? 1 : 0);
    });

    function nodeRadius(d) {
      const v = d.entity_count || 1;
      const r = 6 + Math.log10(v + 2) * 8;
      return Math.max(6, Math.min(28, r));
    }

    function ticked() {
      link.attr('x1', l => l.source.x)
          .attr('y1', l => l.source.y)
          .attr('x2', l => l.target.x)
          .attr('y2', l => l.target.y);

      node.attr('transform', d => `translate(${d.x},${d.y})`);
    }

    function showDetails(n) {
      const related = GRAPH.links.filter(l => l.source.id === n.id || l.target.id === n.id);
      const neighbors = related.map(l => {
        const other = l.source.id === n.id ? l.target.name : l.source.name;
        return { name: other, weight: l.weight, type: l.type };
      });
      neighbors.sort((a,b) => b.weight - a.weight);
      const top5 = neighbors.slice(0,5);
      const html = `<div><strong>${n.name}</strong> (id: ${n.id})</div>` +
                   `<div>Entity count (proxy): ${n.entity_count}</div>` +
                   '<div><strong>Top relations:</strong></div>' +
                   '<ul>' + top5.map(x => `<li>${x.name} — weight ${x.weight.toFixed(2)} ${x.type ? '('+x.type+')' : ''}</li>`).join('') + '</ul>';
      document.getElementById('details-content').innerHTML = html;
    }

    // Basic legend (one entry per edge type)
    function buildLegend() {
      const legend = document.getElementById('legend');
      const items = edgeTypes.map(t => `<span class="legend-item"><span class="legend-swatch" style="background:${color(t)}"></span><span>${t}</span></span>`).join('');
      legend.innerHTML = `<div class="section"><strong>Legend</strong></div>${items}`;
    }
    buildLegend();

    // Window resize
    window.addEventListener('resize', () => {
      svg.attr('width', width()).attr('height', height());
    });
  </script>
</body>
</html>
